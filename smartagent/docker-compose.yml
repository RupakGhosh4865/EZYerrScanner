version: "3.9"

services:

  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - "8082:8080"
    volumes:
      # Mount the official Smartsheet SDK test mappings
      - ./smartsheet-sdk-tests/mappings:/home/wiremock/mappings
    command: ["--port", "8080", "--verbose"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Override URL to use Docker internal network hostname
      - SMARTSHEET_MOCK_URL=http://wiremock:8080
      - USE_MOCK_SERVER=true
    depends_on:
      wiremock:
        condition: service_healthy
    volumes:
      - ./backend:/app  # live reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # preserve container node_modules
